<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotasWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-start:   #eef7ff;
      --bg-end:     #d8ebff;
      --panel:      rgba(255,255,255,0.92);
      --text:       #102a43;
      --muted:      #5c7a96;
      --accent:     #60a5fa;
      --accent-dk:  #2563eb;
      --sidebar-bg: rgba(15,23,42,0.92);
      --border:     rgba(148,163,184,0.18);
      --shadow:     0 24px 50px rgba(15,23,42,0.12);
      --card-shadow:0 8px 30px rgba(15,23,42,0.10);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────── */
    .layout { position:relative; z-index:1; min-height:100vh; padding:20px; gap:20px; }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      min-height: calc(100vh - 40px);
      background: var(--sidebar-bg);
      border-radius: 28px;
      padding: 24px 18px;
      display: flex; flex-direction: column;
      position: sticky; top: 20px;
      align-self: flex-start;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px; padding: 0 4px;
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(96,165,250,.18);
      border: 1px solid rgba(96,165,250,.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 16px;
    }
    .brand-name { font-size: 17px; font-weight: 700; color: #f8fafc; letter-spacing: -.2px; }
    .brand-name span { color: var(--accent); }

    .nav-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #475569;
      padding: 0 8px; margin-bottom: 8px;
    }
    .nav-btn {
      width: 100%; text-align: left; border-radius: 14px; margin-bottom: 4px;
      background: transparent; border: 1px solid transparent;
      color: #94a3b8; padding: 11px 14px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .nav-btn i { font-size: 15px; width: 18px; text-align: center; opacity: .8; }
    .nav-btn:hover { background: rgba(255,255,255,.06); color: #e2e8f0; }
    .nav-btn.active {
      background: rgba(96,165,250,.15);
      border-color: rgba(96,165,250,.3);
      color: #fff;
    }
    .nav-btn.active i { opacity: 1; }

    .sidebar-footer {
      margin-top: auto; padding-top: 16px;
      border-top: 1px solid rgba(148,163,184,.12);
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(96,165,250,.2);
      border: 1px solid rgba(96,165,250,.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 13px; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-logout {
      width: 100%; text-align: left; border-radius: 14px;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
      color: #fca5a5; padding: 10px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: background .15s, color .15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,.18); color: #fff; }

    /* ── Main ───────────────────────────────────── */
    main { flex: 1; min-width: 0; }

    .top-bar {
      display: flex; justify-content: space-between;
      align-items: center; gap: 16px; margin-bottom: 20px;
    }
    .page-heading { font-size: clamp(1.5rem,2.4vw,2rem); font-weight: 700; color: var(--text); }
    .page-sub { color: var(--muted); font-size: .92rem; margin-top: 4px; }

    .btn-new {
      background: var(--accent); color: #fff;
      border: none; border-radius: 999px;
      padding: 12px 22px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 10px 26px rgba(96,165,250,.28);
      cursor: pointer; white-space: nowrap;
      transition: background .2s, transform .15s;
    }
    .btn-new:hover  { background: #3b82f6; transform: translateY(-1px); }
    .btn-new:active { transform: scale(.97); }

    .stats-bar {
      background: var(--panel); border-radius: 20px;
      padding: 16px 22px; box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .stats-bar .label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .stats-bar .count { font-size: 22px; font-weight: 700; color: var(--text); }

    /* ── Notes grid ─────────────────────────────── */
    #app-content { min-height: 40vh; }
    .notes-grid {
      display: flex; flex-wrap: wrap; gap: 16px;
    }
    .card-note {
      width: 230px; border-radius: 22px; padding: 18px;
      box-shadow: var(--card-shadow);
      color: #111827; display: flex; flex-direction: column; gap: 10px;
      border: 1px solid rgba(15,23,42,.07);
      animation: noteIn .3s ease-out both;
    }
    @keyframes noteIn {
      from { opacity:0; transform:translateY(12px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }
    .card-note h5 { font-size: 14px; font-weight: 700; margin: 0; line-height: 1.3; }
    .card-note p  { font-size: 13px; opacity: .72; margin: 0; line-height: 1.45;
                    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .note-date { font-size: 11px; color: rgba(15,23,42,.5); margin-top: auto; }
    .note-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .note-actions button { flex: 1; min-width: 80px; font-size: 12px; font-weight: 600; border-radius: 10px; padding: 7px 10px; }

    /* ── Perfil ─────────────────────────────────── */
    .profile-card {
      background: var(--panel); border-radius: 24px;
      padding: 28px; max-width: 440px; box-shadow: var(--shadow);
    }
    .profile-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(96,165,250,.15);
      border: 2px solid rgba(96,165,250,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--accent); margin-bottom: 16px;
    }
    .profile-name { font-size: 1.3rem; font-weight: 700; }
    .profile-email { color: var(--muted); font-size: .93rem; margin-top: 4px; }
    .profile-id { font-size: 12px; color: #94a3b8; margin-top: 16px; }

    /* ── Modal ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.35); display: none; z-index: 15;
      backdrop-filter: blur(3px);
    }
    .overlay.show { display: block; }
    .modal-note {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: min(600px, 92vw); background: #0f172a; color: #f1f5f9;
      border-radius: 24px; padding: 28px; display: none; z-index: 20;
      max-height: calc(100vh - 60px); overflow-y: auto;
      border: 1px solid rgba(148,163,184,.12);
    }
    .modal-note.show { display: block; animation: modalIn .25s ease-out; }
    @keyframes modalIn {
      from { opacity:0; transform:translate(-50%,-48%) scale(.97); }
      to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }
    .modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }
    .modal-note .form-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
    .modal-note .form-control {
      background: #152238; border: 1px solid rgba(148,163,184,.16);
      color: #e2e8f0; border-radius: 14px; padding: 11px 15px; font-size: 14px;
    }
    .modal-note .form-control::placeholder { color: #2d4a6a; }
    .modal-note .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(96,165,250,.12); }
    textarea.form-control { min-height: 130px; resize: vertical; }

    .colors { display: flex; gap: 10px; flex-wrap: wrap; }
    .color  { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
    .color:hover   { transform: scale(1.15); }
    .color.selected { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.18); }
    .color.c1{background:#ff4d4d} .color.c2{background:#ff66cc} .color.c3{background:#9966ff}
    .color.c4{background:#4d79ff} .color.c5{background:#ffd24d} .color.c6{background:#66cc66}
    .color.c7{background:#ff944d}

    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 6px; }
    .btn-cancel {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      color: #94a3b8; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,.12); color: #e2e8f0; }
    .btn-save {
      background: var(--accent); border: none; color: #fff;
      border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-save:hover { background: #3b82f6; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Toast ──────────────────────────────────── */
    #toast { position: fixed; right: 20px; bottom: 20px; z-index: 30; }
    .toast-msg {
      border-radius: 16px; padding: 13px 18px; color: #fff; font-weight: 600; font-size: 14px;
      box-shadow: 0 12px 30px rgba(15,23,42,.2); animation: toastIn .25s ease-out;
      margin-top: 8px; display: flex; align-items: center; gap: 10px; min-width: 240px;
    }
    .toast-msg i { font-size: 16px; }
    .toast-success { background: #16a34a; }
    .toast-warning { background: #d97706; }
    .toast-danger  { background: #dc2626; }
    @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ── Empty state ────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px 20px;
      color: var(--muted); text-align: center;
    }
    .empty-state i { font-size: 2.5rem; opacity: .35; }
    .empty-state p { font-size: .95rem; max-width: 260px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 860px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; position: static; border-radius: 22px; flex-direction: row; flex-wrap: wrap; align-items: center; }
      .brand { margin-bottom: 0; }
      .nav-label { display: none; }
      .nav-btn { margin-bottom: 0; width: auto; }
      .sidebar-footer { border-top: none; padding-top: 0; margin-top: 0; margin-left: auto; display: flex; align-items: center; gap: 8px; }
      .user-chip { padding: 6px 8px; }
    }
  </style>
</head>
<body>

<div class="layout d-flex">

  <!-- ── SIDEBAR ────────────────────────────────── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-journal-text"></i></div>
      <div class="brand-name">Notas<span>Web</span></div>
    </div>

    <div class="nav-label">Menú</div>
    <button class="nav-btn active" data-page="notas">
      <i class="bi bi-sticky"></i> Mis notas
    </button>
    <button class="nav-btn" data-page="perfil">
      <i class="bi bi-person"></i> Mi perfil
    </button>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar"><i class="bi bi-person-fill"></i></div>
        <span class="user-name" id="nombre-usuario">...</span>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-left"></i> Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────── -->
  <main class="flex-grow-1 p-3 p-md-4">

    <div class="top-bar">
      <div>
        <div class="page-heading" id="pageTitle">Mis notas</div>
        <div class="page-sub"    id="pageDescription">Carga...</div>
      </div>
      <button class="btn-new" id="btnNuevaNota">
        <i class="bi bi-plus-lg"></i> Nueva nota
      </button>
    </div>

    <div class="stats-bar" id="statsBar">
      <span class="label">Total</span>
      <span class="count" id="pageStats">—</span>
    </div>

    <div id="app-content"></div>
  </main>
</div>

<!-- ── OVERLAY ──────────────────────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── MODAL NUEVA NOTA ─────────────────────────── -->
<div class="modal-note" id="modal">
  <div class="modal-title">Nueva nota</div>
  <form id="noteForm">
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input  id="inputTitle"   class="form-control" placeholder="Título de la nota" autocomplete="off" />
    </div>
    <div class="mb-3">
      <label class="form-label">Contenido</label>
      <textarea id="inputContent" class="form-control" placeholder="Escribe aquí tu nota…"></textarea>
    </div>
    <div class="mb-4">
      <label class="form-label">Color</label>
      <div class="colors">
        <span class="color c1 selected" data-color="#ff4d4d"></span>
        <span class="color c2" data-color="#ff66cc"></span>
        <span class="color c3" data-color="#9966ff"></span>
        <span class="color c4" data-color="#4d79ff"></span>
        <span class="color c5" data-color="#ffd24d"></span>
        <span class="color c6" data-color="#66cc66"></span>
        <span class="color c7" data-color="#ff944d"></span>
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-cancel" id="cancelNote">Cancelar</button>
      <button type="submit" class="btn-save"   id="btnGuardar">
        <i class="bi bi-check2"></i> Guardar
      </button>
    </div>
  </form>
</div>

<div id="toast"></div>

<script src="./index.js" defer></script>
</body>
</html>
