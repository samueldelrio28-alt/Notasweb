<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h3 class="mb-3">Crear cuenta</h3>
          <form id="signupForm">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" id="signupNombre" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input type="email" id="signupCorreo" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" id="signupPassword" class="form-control" required />
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <button class="btn btn-primary" type="submit">Crear cuenta</button>
              <a href="/login.html" class="text-decoration-none">Ya tengo cuenta</a>
            </div>
            <div id="signupMsg" class="mt-3 text-danger" style="display:none"></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  async function postJSON(url, body) {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return res.json();
  }

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = document.getElementById('signupNombre').value.trim();
    const correo = document.getElementById('signupCorreo').value.trim();
    const password = document.getElementById('signupPassword').value;
    const msg = document.getElementById('signupMsg');
    msg.style.display = 'none';

    try {
      const data = await postJSON('/api/register', { nombreUser: nombre, emailUser: correo, contraUser: password });
      if (data && data.message) {
        msg.textContent = 'Cuenta creada correctamente. Ahora inicia sesión.';
        msg.style.color = '#16a34a';
        msg.style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 1400);
      } else if (data && data.error) {
        msg.textContent = data.error || 'Error al crear cuenta';
        msg.style.display = 'block';
      }
    } catch (err) {
      msg.textContent = err.message || 'Error en conexión';
      msg.style.display = 'block';
    }
  });
</script>
